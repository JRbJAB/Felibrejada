<body>
<header><h1>🎯 Plan Communication 2027 — Timeline</h1><p>Vue privée en lecture seule · aucune action Gmail, Calendar, publication ou écriture métier</p></header>

let STATE = FALLBACK_STATE;
function cls(pub){if(pub==='NON — INTERNE')return'internal';if(pub==='OUI APRÈS VALIDATION')return'ready';if(pub==='NO GO'||pub==='BLOQUÉ BORNAT')return'danger';if(pub==='BLOQUÉ TECHNIQUE')return'technical';return'warning'}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function counts(){const a=STATE.items;return{total:a.length,internal:a.filter(x=>x.publication==='NON — INTERNE').length,ready:a.filter(x=>x.publication==='OUI APRÈS VALIDATION').length,nogo:a.filter(x=>x.publication==='NO GO').length,bornat:a.filter(x=>x.publication==='BLOQUÉ BORNAT').length,tech:a.filter(x=>x.publication==='BLOQUÉ TECHNIQUE').length}}
function renderCards(){const c=STATE.counts||counts();document.getElementById('cards').innerHTML=[['Axes',c.total],['Internes',c.internal],['Après validation',c.readyAfterValidation??c.ready],['NO GO',c.noGo??c.nogo],['Bloqués Bornat',c.blockedBornat??c.bornat],['Bloqués techniques',c.blockedTechnical??c.tech]].map(x=>`<div class="card"><b>${x[1]||0}</b><span>${x[0]}</span></div>`).join('')}
function fillSelect(id,vals){const el=document.getElementById(id),cur=el.value;el.querySelectorAll('option:not(:first-child)').forEach(o=>o.remove());[...new Set(vals.filter(Boolean))].sort().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o)});el.value=cur}
function filtered(){const q=document.getElementById('q').value.toLowerCase(),p=document.getElementById('phase').value,s=document.getElementById('status').value,u=document.getElementById('pub').value;return STATE.items.filter(x=>(!q||JSON.stringify(x).toLowerCase().includes(q))&&(!p||x.phase===p)&&(!s||x.status===s)&&(!u||x.publication===u))}
function render(){renderCards();fillSelect('phase',STATE.items.map(x=>x.phase));fillSelect('status',STATE.items.map(x=>x.status));fillSelect('pub',STATE.items.map(x=>x.publication));document.getElementById('thead').innerHTML='<tr><th>Plan ID</th><th>Axe / campagne</th>'+STATE.months.map(m=>`<th class="month">${esc(m)}</th>`).join('')+'<th class="meta">Publication</th><th class="meta">Statut</th><th class="meta">Responsable</th><th class="gate">Gate</th><th class="next">Prochaine action</th></tr>';const rows=filtered();document.getElementById('tbody').innerHTML=rows.length?rows.map(x=>`<tr class="clickable" onclick="showDetail('${x.id}')"><td>${esc(x.id)}</td><td>${esc(x.axis)}</td>${STATE.months.map((m,i)=>`<td class="month">${i>=x.start&&i<=x.end?`<div class="bar ${cls(x.publication)}">■</div>`:''}</td>`).join('')}<td>${esc(x.publication)}</td><td>${esc(x.status)}</td><td>${esc(x.owner)}</td><td>${esc(x.gate)}</td><td>${esc(x.next)}</td></tr>`).join(''):'<tr><td colspan="20" class="empty">Aucun axe ne correspond aux filtres.</td></tr>';document.getElementById('foot').textContent=`${rows.length} axe(s) affiché(s) · version ${STATE.version||'aperçu'} · mode ${STATE.mode||'lecture seule'}`}

function openSheet(){window.open(STATE.spreadsheetUrl||FALLBACK_STATE.spreadsheetUrl,'_blank')}
function loadState(){if(window.google&&google.script&&google.script.run){google.script.run.withSuccessHandler(s=>{STATE=s;render()}).withFailureHandler(e=>{console.error(e);STATE=FALLBACK_STATE;render()}).FBR_PLAN_COMM_getTimelineState_()}else{STATE=FALLBACK_STATE;render()}}

</script>
